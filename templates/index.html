<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Virtual Try-On</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
            background: white;
            color: black;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .preview {
            margin-top: 15px;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">👗 AI Virtual Try-On</div>
    <div class="subtitle">Upload your outfit & get smart suggestions</div>

    <h2>Upload Dress Image</h2>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" onchange="previewImage(event)" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    <div class="preview">
        <img id="output" />
    </div>

</div>

<script>
function previewImage(event) {
    const image = document.getElementById('output');
    image.src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
